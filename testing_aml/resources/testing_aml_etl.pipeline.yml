# The main pipeline for testing_aml

resources:
  pipelines:
    testing_aml_etl:
      name: testing_aml_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      root_path: "../src/testing_aml_etl"

      libraries:
        - glob:
            include: ../src/testing_aml_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}

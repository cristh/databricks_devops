# This is a Databricks asset bundle definition for testing_aml.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: testing_aml
  uuid: 7e0efd61-9691-451e-81d6-e29bb8dd1b86

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-1088122133195134.14.azuredatabricks.net
    variables:
      catalog: aml_data
      schema: ${workspace.current_user.short_name}
    presets:
      artifacts_dynamic_version: true
  prod:
    mode: production
    workspace:
      host: https://adb-1088122133195134.14.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/cris.guzman@iaware.pro to make sure we only have a single copy.
      root_path: /Workspace/Users/cris.guzman@iaware.pro/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: aml_data
      schema: prod
    permissions:
      - user_name: cris.guzman@iaware.pro
        level: CAN_MANAGE

# Databricks asset bundle definition for testing_aml
bundle:
  name: testing_aml
  uuid: 7e0efd61-9691-451e-81d6-e29bb8dd1b86

include:
  - resources/*.yml
  - resources/*/*.yml

variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-1088122133195134.14.azuredatabricks.net
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: aml_data
      schema: ${workspace.current_user.short_name}
    presets:
      artifacts_dynamic_version: true
      trigger_pause_status: PAUSED
      tags:
        Project: STP
        Environment: dev

  qa:
    mode: production
    workspace:
      host: https://adb-1088122133195134.14.azuredatabricks.net
      root_path: /Workspace/Shared/bundles/testing_aml/${bundle.target}
    variables:
      catalog: aml_data
      schema: silver
    presets:
      name_prefix: "[QA] "
      trigger_pause_status: PAUSED
      tags:
        Project: STP
        Environment: qa
    permissions:
      - user_name: cris.guzman@iaware.pro
        level: CAN_MANAGE
      - group_name: Iaware Devs
        level: CAN_MANAGE

  prod:
    mode: production
    git:
      branch: main
    workspace:
      host: https://adb-1088122133195134.14.azuredatabricks.net
      root_path: /Workspace/Shared/bundles/testing_aml/${bundle.target}
    variables:
      catalog: aml_data
      schema: gold
    presets:
      name_prefix: "[PROD] "
      trigger_pause_status: PAUSED
      tags:
        Project: STP
        Environment: prod
    permissions:
      - user_name: cris.guzman@iaware.pro
        level: CAN_MANAGE
      - group_name: Iaware Devs
        level: CAN_MANAGE

    # Para productivo real después:
    # run_as:
    #   service_principal_name: "APPLICATION_ID_DEL_SERVICE_PRINCIPAL"